name: 同步上游订阅源

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 检查上游是否有更新
        id: check
        run: |
          UPSTREAM=$(curl -s "https://api.github.com/repos/Jsnzkpg/Jsnzkpg/branches/Jsnzkpg" \
            -H "Accept: application/vnd.github+json" | jq -r '.commit.sha')
          echo "upstream_sha=${UPSTREAM}" >> "$GITHUB_OUTPUT"
          if [ -f .last_sha ]; then
            LAST=$(cat .last_sha)
            if [ "${UPSTREAM}" = "${LAST}" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "no update"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "update found: ${LAST:0:7} -> ${UPSTREAM:0:7}"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "first sync: ${UPSTREAM:0:7}"
          fi

      - name: 下载源文件
        if: steps.check.outputs.changed == 'true'
        run: |
          UPSTREAM_URL="https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg"
          curl -sL "${UPSTREAM_URL}/Jsnzkpg1"    -o /tmp/raw_Live
          curl -sL "${UPSTREAM_URL}/Jsnzkpg1.m3u" -o /tmp/raw_IPTV.m3u
          curl -sL "${UPSTREAM_URL}/Jsnzkpg2"    -o /tmp/raw_TVbox
          curl -sL "${UPSTREAM_URL}/Jsnzkpg3"    -o /tmp/raw_UZ
          curl -sL "${UPSTREAM_URL}/Jsnzkpg5"    -o /tmp/raw_EchoTV
          echo "done"

      - name: 去广告处理
        if: steps.check.outputs.changed == 'true'
        run: |
          python3 -c "
          import json, shutil
          import shutil as _sh
          import json as _js
          with open('/tmp/raw_Live', 'r') as f:
              c = f.read()
          idx = c.find('🔥')
          if idx != -1:
              c = c[idx + 1:]
          with open('Live', 'w') as f:
              f.write(c)
          with open('/tmp/raw_IPTV.m3u', 'r') as f:
              lines = f.readlines()
          kept, skip = [], False
          for i, line in enumerate(lines):
              if skip:
                  skip = False; continue
              if '✈️TG频道' in line:
                  if i + 1 < len(lines): skip = True
                  continue
              kept.append(line)
          with open('IPTV.m3u', 'w') as f:
              f.writelines(kept)
          _sh.copy2('/tmp/raw_TVbox', 'TVbox')
          with open('/tmp/raw_UZ', 'r') as f:
              data = _js.load(f)
          for sec in ['live', 'vod']:
              if sec in data:
                  for item in data[sec]:
                      item.pop('remark', None)
                  data[sec] = [item for item in data[sec] if '频道' not in item.get('name', '')]
          with open('UZ', 'w') as f:
              _js.dump(data, f, indent=2, ensure_ascii=False)
          with open('/tmp/raw_EchoTV', 'r') as f:
              data = _js.load(f)
          keys = [k for k, v in data.get('api_site', {}).items() if '频道' in v.get('name', '')]
          for k in keys:
              del data['api_site'][k]
          with open('EchoTV', 'w') as f:
              _js.dump(data, f, indent=2, ensure_ascii=False)
          print('done')
          "
      - name: 更新 README
        if: steps.check.outputs.changed == 'true'
        run: |
          python3 -c "
          line = []
          line.append('<!-- SUB_SECTION_START -->')
          line.append('')
          line.append('## 📡 订阅源（自动同步）')
          line.append('')
          line.append('> 上游：[Jsnzkpg/Jsnzkpg](https://github.com/Jsnzkpg/Jsnzkpg) | 每日自动检测更新，已去除广告推广内容')
          line.append('')
          line.append('| 名称 | 直链（已加 gh-proxy 加速） |')
          line.append('|:---|:---|')
          line.append('| 📺 IPTV订阅 | \`https://gh-proxy.org/https://raw.githubusercontent.com/AudiHub/WanXiang-Release/main/IPTV.m3u\` |')
          line.append('| 🎥 TVbox订阅 | \`https://gh-proxy.org/https://raw.githubusercontent.com/AudiHub/WanXiang-Release/main/TVbox\` |')
          line.append('| 🎞️ UZ影视订阅 | \`https://gh-proxy.org/https://raw.githubusercontent.com/AudiHub/WanXiang-Release/main/UZ\` |')
          line.append('| 📹 EchoTV订阅 | \`https://gh-proxy.org/https://raw.githubusercontent.com/AudiHub/WanXiang-Release/main/EchoTV\` |')
          line.append('| 🎬 万象订阅 | \`https://gh-proxy.org/https://raw.githubusercontent.com/AudiHub/WanXiang-Release/main/subscribe/wanxiang.json\` |')
          line.append('')
          line.append('<!-- SUB_SECTION_END -->')
          sub = chr(10).join(line)
          ms = '<!-- SUB_SECTION_START -->'
          me = '<!-- SUB_SECTION_END -->'
          with open('README.md', 'r') as f:
              cur = f.read()
          if ms in cur:
              before = cur.split(ms)[0]
              after_ = cur.split(me)[1]
              new_c = before + sub + after_
          else:
              new_c = cur.replace('## License', sub + chr(10) + chr(10) + '## License')
          with open('README.md', 'w') as f:
              f.write(new_c)
          print('done')
          "

      - name: 万象影视订阅源抓取
        run: |
          python3 scripts/scrape_and_build.py

      - name: 复制订阅文件到根目录
        run: |
          cp subscribe/wanxiang.json wanxiang.json 2>/dev/null || true
      - name: 提交并推送
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "${{ steps.check.outputs.upstream_sha }}" > .last_sha
          git config user.name "sync-bot"
          git config user.email "bot@users.noreply.github.com"
          git add .
          git commit -m "sync upstream $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git push
